<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bat-yellow: #FFD700;
      --bat-black: #0D0D0D;
      --bat-gray: #1A1A1A;
      --text-dim: #777;
      --high-red: #FF4444;
    }

    body {
      width: 350px;
      background: var(--bat-black);
      color: white;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
    }

    /* Tech Greeting */
    .user-greeting {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      color: var(--bat-yellow);
      letter-spacing: 2px;
      margin-bottom: 20px;
      padding: 5px;
      border-left: 2px solid var(--bat-yellow);
      background: rgba(255, 215, 0, 0.03);
    }

    .header { text-align: center; margin-bottom: 25px; }
    
    /* Accurate Batman Logo */
    .bat-logo { width: 80px; fill: var(--bat-yellow); filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.4)); }

    /* Modern Dial Timer */
    .timer-container { text-align: center; position: relative; margin-bottom: 30px; }
    
    .dial-wrapper {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #timer-display {
      position: absolute;
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      color: var(--bat-yellow);
      z-index: 2;
    }

    /* Range slider styled as a minimalist bar under the numbers */
    #time-slider {
      width: 140px;
      accent-color: var(--bat-yellow);
      margin-top: 80px;
      cursor: pointer;
    }

    .btn-main {
      background: var(--bat-yellow);
      border: none;
      color: black;
      width: 100%;
      padding: 12px;
      font-weight: 800;
      font-family: 'Orbitron', sans-serif;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s ease;
      margin-top: 15px;
    }

    .btn-main:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--bat-yellow); }

    /* Tweek-style Planner */
    .planner-section { margin-top: 25px; border-top: 1px solid #222; padding-top: 20px; }
    
    .mission-box {
      background: var(--bat-gray);
      padding: 15px;
      border-radius: 12px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    #task-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #333;
      color: white;
      width: 100%;
      padding: 10px 0;
      margin-bottom: 12px;
      outline: none;
    }

    .priority-row { display: flex; gap: 8px; margin-bottom: 15px; }
    
    .p-btn {
      flex: 1;
      padding: 6px;
      background: #222;
      border: 1px solid #333;
      color: var(--text-dim);
      font-size: 10px;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
    }

    .p-btn.active[data-p="low"] { border-color: #00AAFF; color: #00AAFF; }
    .p-btn.active[data-p="med"] { border-color: var(--bat-yellow); color: var(--bat-yellow); }
    .p-btn.active[data-p="high"] { border-color: var(--high-red); color: var(--high-red); }

    #task-list { list-style: none; padding: 0; margin-top: 20px; }

      padding: 14px;
