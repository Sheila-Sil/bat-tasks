<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bat-yellow: #E2B007;
      --bat-black: #0F0F11;
      --bat-gray: #1C1C1E;
      --high: #FF453A;
      --med: #FF9F0A;
      --low: #0A84FF;
    }
    body {
      width: 350px; background: var(--bat-black); color: white;
      font-family: 'Inter', sans-serif; margin: 0; padding: 20px;
    }
    .greeting {
      font-family: 'Orbitron'; font-size: 8px; color: var(--bat-yellow);
      letter-spacing: 2px; border-left: 2px solid var(--bat-yellow);
      padding-left: 8px; margin-bottom: 20px;
    }
    .header { text-align: center; margin-bottom: 20px; }
    .bat-logo { width: 80px; fill: var(--bat-yellow); }

    .timer-card { background: var(--bat-gray); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; }
    #timer-display { font-family: 'Orbitron'; font-size: 42px; color: white; margin-bottom: 10px; }
    input[type=range] { width: 80%; accent-color: var(--bat-yellow); cursor: pointer; }
    
    .btn-action {
      background: var(--bat-yellow); border: none; width: 100%; padding: 12px;
      font-family: 'Orbitron'; font-weight: bold; border-radius: 6px; margin-top: 15px; cursor: pointer;
    }

    .planner-card { background: var(--bat-gray); border-radius: 12px; padding: 15px; }
    #task-input {
      background: #2C2C2E; border: none; color: white;
      width: 100%; padding: 10px; border-radius: 6px; box-sizing: border-box; outline: none;
    }
    .p-row { display: flex; gap: 5px; margin: 10px 0; }
    .p-btn {
      flex: 1; padding: 5px; background: #2C2C2E; border: 1px solid #3A3A3C;
      color: #8E8E93; font-size: 9px; border-radius: 4px; cursor: pointer;
    }
    .p-btn.active { border-color: var(--bat-yellow); color: var(--bat-yellow); }
    
    #task-list { padding: 0; list-style: none; margin-top: 15px; }
    .task-item {
      background: #2C2C2E; padding: 10px; border-radius: 6px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center; font-size: 13px;
    }
    .high { border-left: 4px solid var(--high); }
    .med { border-left: 4px solid var(--med); }
    .low { border-left: 4px solid var(--low); }
  </style>
</head>
<body>
  <div class="greeting">AUTHENTICATED: SHEILA // DEV_ACCESS_01</div>
  <div class="header">
